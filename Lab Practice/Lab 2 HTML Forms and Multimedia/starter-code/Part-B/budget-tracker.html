<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Tracker - MyFinance Dashboard</title>
</head>
<body>
  <header>
    <h1>Budget Tracker</h1>
    <p>Log your income and expenses</p>
  </header>

  <nav>
    <a href="index.html">Dashboard</a> |
    <a href="budget-tracker.html">Budget Tracker</a> |
    <a href="goal-planner.html">Goal Planner</a> |
    <a href="account-application.html">New Account</a>
  </nav>

  <main>
    <h2>Add Transaction</h2>

    <form action="/api/transactions" method="POST">

  
      <fieldset>
        <legend>Transaction Type</legend>

        <input type="radio" id="income" name="type" value="income" required />
        <label for="income">Income</label>

        <input type="radio" id="expense" name="type" value="expense" />
        <label for="expense">Expense</label>
      </fieldset>

     
      <label for="category">
        Category <span aria-label="required">*</span>
      </label>
      <select id="category" name="category" required aria-required="true">
        <option value="">-- Choose Category --</option>

        <optgroup label="Income Categories">
          <option value="salary">Salary</option>
          <option value="freelance">Freelance</option>
          <option value="investment">Investment</option>
          <option value="other-income">Other Income</option>
        </optgroup>

        <optgroup label="Expense Categories">
          <option value="food">Food</option>
          <option value="transport">Transport</option>
          <option value="entertainment">Entertainment</option>
          <option value="utilities">Utilities</option>
          <option value="healthcare">Healthcare</option>
          <option value="shopping">Shopping</option>
          <option value="education">Education</option>
          <option value="other-expense">Other Expense</option>
        </optgroup>
      </select>

     
      <label for="amount">
        Amount (QAR) <span aria-label="required">*</span>
      </label>
      <input
        type="number"
        id="amount"
        name="amount"
        min="0"
        step="0.01"
        required
        aria-required="true"
        aria-describedby="amount-help"
      />
      <small id="amount-help">Enter amount in Qatari Riyals</small>

    
      <label for="date">
        Transaction Date <span aria-label="required">*</span>
      </label>
      <input
        type="date"
        id="date"
        name="date"
        max="2026-12-31"
        required
        aria-required="true"
      />
      
      <label for="description">
        Description <span aria-label="required">*</span>
      </label>
      <input
        type="text"
        id="description"
        name="description"
        maxlength="100"
        placeholder="  "
        required
        aria-required="true"
      />

    
      <label for="account">
        Account <span aria-label="required">*</span>
      </label>
      <select id="account" name="account" required aria-required="true">
        <option value="">-- Select Account --</option>
        <option value="primary-checking">Primary Checking</option>
        <option value="emergency-fund">Emergency Fund</option>
        <option value="stock-portfolio">Stock Portfolio</option>
      </select>

      
      <fieldset>
        <legend>Payment Method</legend>

        <input type="radio" id="cash" name="payment" value="cash" checked />
        <label for="cash">Cash</label>

        <input type="radio" id="card" name="payment" value="card" />
        <label for="card">Debit/Credit Card</label>

        <input type="radio" id="transfer" name="payment" value="transfer" />
        <label for="transfer">Bank Transfer</label>
      </fieldset>

      
      <label for="tags">Tags (optional)</label>
      <input
        type="text"
        id="tags"
        name="tags"
        placeholder=" "
        aria-describedby="tags-help"
      />
      <small id="tags-help">Separate multiple tags with commas</small>


      <input type="checkbox" id="recurring" name="recurring" value="yes" />
      <label for="recurring">This is a recurring transaction</label>

   

      <button type="submit">Add Transaction</button>
      <button type="reset">Clear Form</button>

    </form>
  </main>
      

  <footer>
    <p>&copy; 2026 MyFinance Dashboard</p>
    <p><a href="index.html">Back to Dashboard</a></p>
  </footer>
</body>
</html>
